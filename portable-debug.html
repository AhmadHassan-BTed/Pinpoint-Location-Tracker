<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinpoint | Portable Debug Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .mono { font-family: ui-monospace, monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .output-field { background: #020617; border: 1px solid #1e293b; color: #10b981; font-size: 0.75rem; min-height: 100px; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-white tracking-tight">Portable Debug Console</h1>
            <p class="text-emerald-500 text-sm font-bold animate-pulse">● Serverless Mode Enabled (No CORS Errors)</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Module: Geolocation -->
            <div class="glass p-6 rounded-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold text-slate-200">Geolocation Core</h2>
                    <button onclick="execute('location')" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold px-4 py-2 rounded-lg transition">Execute</button>
                </div>
                <pre id="field-location" class="output-field p-4 rounded-xl overflow-auto mono whitespace-pre-wrap">Awaiting trigger...</pre>
            </div>

            <!-- Module: Network -->
            <div class="glass p-6 rounded-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold text-slate-200">Network Resolver</h2>
                    <button onclick="execute('network')" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold px-4 py-2 rounded-lg transition">Execute</button>
                </div>
                <pre id="field-network" class="output-field p-4 rounded-xl overflow-auto mono whitespace-pre-wrap">Awaiting trigger...</pre>
            </div>

            <!-- Module: Browser Storage -->
            <div class="glass p-6 rounded-2xl md:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold text-slate-200">Storage Auditor (Cookies/PII)</h2>
                    <button onclick="execute('storage')" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold px-4 py-2 rounded-lg transition">Execute</button>
                </div>
                <pre id="field-storage" class="output-field p-4 rounded-xl overflow-auto mono whitespace-pre-wrap">Awaiting trigger...</pre>
            </div>

        </div>
    </div>

    <script>
        // BUNDLED MODULES (To bypass CORS file:// restriction)
        
        const extractLocation = () => {
            return new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(
                    (p) => resolve({ lat: p.coords.latitude, lon: p.coords.longitude, acc: p.coords.accuracy }),
                    (e) => reject(e),
                    { enableHighAccuracy: true }
                );
            });
        };

        const resolvePublicIP = async () => {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch (e) { return "unknown"; }
        };

        const extractStorage = () => {
            return {
                cookies: document.cookie || "none",
                localStorage: { ...localStorage },
                sessionStorage: { ...sessionStorage }
            };
        };

        async function execute(module) {
            const field = document.getElementById(`field-${module}`);
            field.innerText = "Processing...";
            
            try {
                let data;
                if (module === 'location') data = await extractLocation();
                if (module === 'network') data = { ip: await resolvePublicIP() };
                if (module === 'storage') data = extractStorage();
                
                field.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                field.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
