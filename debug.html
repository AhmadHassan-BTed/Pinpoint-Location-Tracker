<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | ZERO_COUPLING v3.2.0</title>
    <style>
        :root { --cyber-green: #00ff41; --cyber-yellow: #ffcc00; --cyber-red: #ff003c; --cyber-purple: #9d00ff; --bg-black: #000; --card-bg: #030303; }
        body {
            background-color: var(--bg-black); color: var(--cyber-green);
            font-family: 'JetBrains Mono', monospace; margin: 0; padding: 30px;
            zoom: 1.1;
            background-image: linear-gradient(rgba(0, 255, 65, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 65, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .header {
            border: 1px solid rgba(0, 255, 65, 0.4); padding: 30px; margin-bottom: 40px;
            background: var(--card-bg); box-shadow: 0 0 30px rgba(0, 255, 65, 0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .threat-section { margin-bottom: 60px; }
        .threat-header {
            font-size: 14px; font-weight: bold; letter-spacing: 5px; margin-bottom: 25px;
            padding: 10px; border-left: 5px solid transparent; text-transform: uppercase;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .cyber-card {
            background: var(--card-bg); padding: 25px; display: flex; flex-direction: column; 
            height: 320px; transition: 0.3s; position: relative; border: 1px solid;
        }
        .cyber-card:hover { transform: scale(1.02); z-index: 10; }
        .terminal-output {
            background: #000; border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px; font-size: 11px; flex: 1; overflow-y: auto; 
            word-break: break-all; white-space: pre-wrap; line-height: 1.5;
        }
        .cyber-btn {
            background: transparent; border: 1px solid;
            padding: 6px 15px; font-size: 10px; font-weight: bold; 
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .info-btn {
            width: 24px; height: 24px; border-radius: 50%; border: 1px solid;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; cursor: pointer; opacity: 0.6; margin-right: 10px;
        }

        .lvl-1 { border-color: rgba(0, 255, 65, 0.2); color: var(--cyber-green); }
        .lvl-1 .threat-header { border-color: var(--cyber-green); background: rgba(0, 255, 65, 0.05); color: var(--cyber-green); }
        .lvl-1 .cyber-card { border-color: rgba(0, 255, 65, 0.15); }
        .lvl-1 .cyber-btn, .lvl-1 .info-btn { border-color: var(--cyber-green); color: var(--cyber-green); }
        .lvl-1 .cyber-btn:hover, .lvl-1 .info-btn:hover { background: var(--cyber-green); color: #000; }

        .lvl-2 { border-color: rgba(255, 204, 0, 0.2); color: var(--cyber-yellow); }
        .lvl-2 .threat-header { border-color: var(--cyber-yellow); background: rgba(255, 204, 0, 0.05); color: var(--cyber-yellow); }
        .lvl-2 .cyber-card { border-color: rgba(255, 204, 0, 0.15); }
        .lvl-2 .cyber-btn, .lvl-2 .info-btn { border-color: var(--cyber-yellow); color: var(--cyber-yellow); }
        .lvl-2 .cyber-btn:hover, .lvl-2 .info-btn:hover { background: var(--cyber-yellow); color: #000; }
        .lvl-2 .terminal-output { color: var(--cyber-yellow); }

        .lvl-3 { border-color: rgba(255, 0, 60, 0.2); color: var(--cyber-red); }
        .lvl-3 .threat-header { border-color: var(--cyber-red); background: rgba(255, 0, 60, 0.05); color: var(--cyber-red); }
        .lvl-3 .cyber-card { border-color: rgba(255, 0, 60, 0.15); }
        .lvl-3 .cyber-btn, .lvl-3 .info-btn { border-color: var(--cyber-red); color: var(--cyber-red); }
        .lvl-3 .cyber-btn:hover, .lvl-3 .info-btn:hover { background: var(--cyber-red); color: #fff; }
        .lvl-3 .terminal-output { color: var(--cyber-red); }

        .lvl-4 { border-color: rgba(157, 0, 255, 0.2); color: var(--cyber-purple); }
        .lvl-4 .threat-header { border-color: var(--cyber-purple); background: rgba(157, 0, 255, 0.05); color: var(--cyber-purple); }
        .lvl-4 .cyber-card { border-color: rgba(157, 0, 255, 0.25); }
        .lvl-4 .cyber-btn, .lvl-4 .info-btn { border-color: var(--cyber-purple); color: var(--cyber-purple); }
        .lvl-4 .cyber-btn:hover, .lvl-4 .info-btn:hover { background: var(--cyber-purple); color: #fff; }
        .lvl-4 .terminal-output { color: var(--cyber-purple); }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-content {
            width: 90%; max-width: 650px; background: #050505; border: 1px solid;
            padding: 40px; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .steps-list { list-style: none; padding: 0; margin: 15px 0; }
        .steps-list li { margin-bottom: 12px; padding-left: 25px; position: relative; font-size: 13px; color: #ccc; }
        .steps-list li::before { content: "▶"; position: absolute; left: 0; }

        .m-lvl-1 { border-color: var(--cyber-green) !important; }
        .m-lvl-1 .m-accent { color: var(--cyber-green); }
        .m-lvl-2 { border-color: var(--cyber-yellow) !important; }
        .m-lvl-2 .m-accent { color: var(--cyber-yellow); }
        .m-lvl-3 { border-color: var(--cyber-red) !important; }
        .m-lvl-3 .m-accent { color: var(--cyber-red); }
        .m-lvl-4 { border-color: var(--cyber-purple) !important; }
        .m-lvl-4 .m-accent { color: var(--cyber-purple); }
    </style>
</head>
<body>

    <div id="modal-overlay" onclick="window.closeModal()">
        <div id="modal-box" class="modal-content" onclick="event.stopPropagation()">
            <div id="m-title" class="m-accent" style="font-size: 18px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 5px;"></div>
            <div id="m-body"></div>
        </div>
    </div>

    <header class="header">
        <div>
            <h1 style="margin:0; letter-spacing: 10px; font-size: 1.8rem; font-weight: 700;">PINPOINT_SHADOW</h1>
            <span style="font-size: 10px; opacity: 0.5;">ZERO_COUPLING // SESSION_v3.2</span>
        </div>
        <a href="index.html" class="cyber-btn" style="border-color: var(--cyber-green); color: var(--cyber-green);">EXIT</a>
    </header>

    <div id="sections-container"></div>

    <script type="module">
        import { PinpointEngine } from './src/core/engine.js';
        window.closeModal = () => { document.getElementById('modal-overlay').style.display = 'none'; };
        
        // BOOTSTRAP THE FRAMEWORK
        PinpointEngine.bootstrap();
    </script>
</body>
</html>
